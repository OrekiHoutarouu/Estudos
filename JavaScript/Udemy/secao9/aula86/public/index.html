<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo</title>
</head>

<body>
    <section class="container">
        <h1>Gerador de senhas</h1>

        <div id="senha-gerada">Selecione as opções</div>

        <form action="">
            <label for="caracteres">Quantidade de caracteres:</label>
            <input type="number" value="5" name="caracteres" id="caracteres" min="1" max="50">

            <label for="maiusculas">Adicionar maiúsculas</label>
            <input type="checkbox" name="maiusculas" id="maiusculas" class="check">

            <br>

            <label for="minusculas">Adicionar minúsculas</label>
            <input type="checkbox" name="minusculas" id="minusculas" class="check">
            
            <br>

            <label for="numeros">Adicionar números</label>
            <input type="checkbox" name="numeros" id="numeros" class="check">

            <br>

            <label for="simbolos">Adicionar símbolos</label>
            <input type="checkbox" name="simbolos" id="simbolos" class="check">

            <br>

            <button id="gerar-senha" class="button">Gerar senha</button>
        </form>
    </section>

    <script src="./assets/js/bundle.js"></script>
</body>
</html>
